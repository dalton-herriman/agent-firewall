name: CI

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements-dev.txt
          .venv/bin/pip install -e .
      - name: Compile
        run: .venv/bin/python -m compileall src tests alembic scripts examples
      - name: Test
        run: .venv/bin/pytest -q

  integration:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: agent_firewall
          POSTGRES_USER: agent_firewall
          POSTGRES_PASSWORD: agent_firewall
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agent_firewall -d agent_firewall"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      AGENT_FIREWALL_RUN_INTEGRATION: "1"
      AGENT_FIREWALL_TEST_DATABASE_URL: postgresql+asyncpg://agent_firewall:agent_firewall@localhost:5432/agent_firewall
      AGENT_FIREWALL_TEST_REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -r requirements-dev.txt
          .venv/bin/pip install -e .
      - name: Run integration tests
        run: .venv/bin/pytest -q -m integration
